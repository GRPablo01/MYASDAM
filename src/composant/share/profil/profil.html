<section class="relative flex items-center justify-end px-2 py-1 sm:px-4 sm:py-2">

    <!-- ======================= -->
    <!-- BOUTON UTILISATEUR -->
    <!-- ======================= -->
    <button id="userButton" type="button" [attr.aria-expanded]="dropdownOpen" aria-haspopup="true"
        (click)="toggleDropdown()" 
        [ngStyle]="{
            'background': dropdownOpen ? Background2 : Background,
            'color': Text,
            'box-shadow': dropdownOpen ? '0 4px 20px rgba(0,0,0,0.15)' : '0 2px 10px rgba(0,0,0,0.08)'
        }"
        class="group flex items-center gap-2 sm:gap-3 px-2 sm:px-3 py-1.5 sm:py-2 rounded-full backdrop-blur-sm transition-all duration-300 active:scale-95 focus:outline-none hover:scale-[1.02]">

        <!-- Avatar avec statut -->
        <div class="relative">
            <div [ngStyle]="{'background': Background1, 'color':'#FFF'}"
                class="w-7 h-7 sm:w-9 sm:h-9 rounded-full flex items-center justify-center font-semibold text-xs sm:text-sm shadow-inner transition-transform duration-300 group-hover:scale-110 group-hover:shadow-lg">

                <span *ngIf="nom && prenom; else defaultIcon">
                    {{ initials }}
                </span>

                <ng-template #defaultIcon>
                    <svg class="w-4 h-4 sm:w-5 sm:h-5 transition-transform duration-300 group-hover:rotate-12" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z" />
                    </svg>
                </ng-template>
            </div>

            <!-- Cercle de statut -->
            <span [ngStyle]="{'background-color': StatutColor}"
                class="absolute bottom-0 right-0 w-2 h-2 sm:w-3 sm:h-3 rounded-full border-2 border-white transition-transform duration-300 group-hover:scale-125"></span>
        </div>

        <!-- Infos utilisateur - TOUJOURS VISIBLE -->
        <div class="flex flex-col items-start mr-1" [ngStyle]="{'color': '#FFF'}">
            <span class="text-xs sm:text-sm font-semibold leading-tight truncate max-w-[100px] sm:max-w-[120px] transition-all duration-300 group-hover:tracking-wide">
                {{ nom && prenom ? (nom + ' ' + prenom) : 'Invité' }}
            </span>
            <span class="text-[10px] sm:text-xs leading-tight opacity-70 transition-opacity duration-300 group-hover:opacity-100">
                {{ role ? (role | titlecase) : 'Invité' }}
            </span>
        </div>

        <!-- Flèche -->
        <svg class="w-3 h-3 sm:w-4 sm:h-4 text-white transition-transform duration-300 group-hover:translate-y-0.5"
            [class.rotate-180]="dropdownOpen" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>

    </button>

    <!-- ======================= -->
    <!-- MENU DROPDOWN -->
    <!-- ======================= -->
    <div id="dropdownMenu" role="menu" aria-orientation="vertical"
        [ngStyle]="{'background': Background3, 'color': Text}"
        class="fixed sm:absolute right-2 sm:right-4 top-14 sm:top-full mt-1 w-[calc(100vw-1rem)] sm:w-64 max-w-[280px] backdrop-blur-xl rounded-xl sm:rounded-2xl shadow-2xl z-50 overflow-hidden transform transition-all duration-300 ease-out origin-top-right"
        [class.opacity-0]="!dropdownOpen" [class.scale-95]="!dropdownOpen" [class.pointer-events-none]="!dropdownOpen"
        [class.opacity-100]="dropdownOpen" [class.scale-100]="dropdownOpen">

        <!-- Header -->
        <div class="px-3 sm:px-4 py-2 sm:py-3" [ngStyle]="{'background': Background2, 'color': '#FFF'}">

            <!-- Ligne Nom + Statut -->
            <div class="flex items-center gap-2">

                <!-- Nom complet -->
                <p class="text-sm font-bold truncate transition-all duration-200 hover:scale-[1.02] cursor-default">
                    {{ nom && prenom ? (nom + ' ' + prenom) : 'Invité' }}
                </p>

                <!-- Badge Statut utilisateur -->
                <span [ngStyle]="{'background-color': StatutColor}"
                    class="flex items-center gap-1 px-2 py-0.5 rounded-full text-white text-xs sm:text-[10px] font-medium transition-all duration-200 hover:scale-105 hover:shadow-md cursor-default">
                    <!-- Cercle de couleur -->
                    <span class="w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-full border border-white animate-pulse"></span>
                    <!-- Texte du statut -->
                    <span class="truncate capitalize">
                        {{ statut }}
                    </span>
                </span>

            </div>

            <!-- Email en dessous -->
            <p class="text-xs truncate opacity-70 mt-0.5 transition-opacity duration-200 hover:opacity-100 cursor-default">
                {{ email || 'Aucun email' }}
            </p>

        </div>

        <!-- Options -->
        <div class="py-1" [ngStyle]="{'background': Background3}">

            <!-- PROFIL -->
            <a href="/dashboard" role="menuitem"
                [ngStyle]="{
                    'background': activeHover === 'dashboard' ? Background4 : 'transparent',
                    'color': activeHover === 'dashboard' ? '#FFF' : Text
                }"
                (mouseenter)="activeHover = 'dashboard'" 
                (mouseleave)="activeHover = null"
                class="group flex items-center px-3 sm:px-4 py-2 sm:py-2.5 text-sm transition-all duration-200 active:scale-[0.98] cursor-pointer relative overflow-hidden">

                <!-- Effet de vague au hover -->
                <div class="absolute inset-0 opacity-0 group-hover:opacity-10 transition-opacity duration-300"
                     [ngStyle]="{'background': 'radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), ' + Background2 + ' 0%, transparent 60%)'}">
                </div>

                <div class="w-7 h-7 sm:w-8 sm:h-8 rounded-lg flex items-center justify-center mr-2 sm:mr-3 shrink-0 transition-all duration-300 group-hover:scale-110 group-hover:rotate-3"
                    [ngStyle]="{
                        'background': activeHover === 'dashboard' ? Background2 : Background4,
                        'color': '#FFF',
                        'box-shadow': activeHover === 'dashboard' ? '0 4px 12px rgba(0,0,0,0.15)' : 'none'
                    }">
                    <i class="fa-solid fa-user text-sm transition-transform duration-300 group-hover:scale-110"></i>
                </div>

                <div class="flex-1 min-w-0">
                    <span class="font-medium text-sm transition-transform duration-200 group-hover:translate-x-1 inline-block">DashBoard</span>
                    <span class="block text-xs opacity-60 truncate transition-opacity duration-200 group-hover:opacity-100">
                        Gérer votre compte
                    </span>
                </div>
                
                <!-- Flèche indicateur -->
                <svg class="w-4 h-4 opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300" 
                     fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </a>

            <!-- PARAMÈTRES -->
            <a href="#" role="menuitem"
                [ngStyle]="{
                    'background': activeHover === 'settings' ? Background4 : 'transparent',
                    'color': activeHover === 'settings' ? '#FFF' : Text
                }"
                (mouseenter)="activeHover = 'settings'" 
                (mouseleave)="activeHover = null"
                class="group flex items-center px-3 sm:px-4 py-2 sm:py-2.5 text-sm transition-all duration-200 active:scale-[0.98] cursor-pointer relative overflow-hidden">

                <div class="w-7 h-7 sm:w-8 sm:h-8 rounded-lg flex items-center justify-center mr-2 sm:mr-3 shrink-0 transition-all duration-300 group-hover:scale-110 group-hover:rotate-90"
                    [ngStyle]="{
                        'background': activeHover === 'settings' ? Background2 : Background4,
                        'color': '#FFF',
                        'box-shadow': activeHover === 'settings' ? '0 4px 12px rgba(0,0,0,0.15)' : 'none'
                    }">
                    <i class="fa-solid fa-gear text-sm transition-transform duration-500 group-hover:rotate-180"></i>
                </div>

                <div class="flex-1 min-w-0">
                    <span class="font-medium text-sm transition-transform duration-200 group-hover:translate-x-1 inline-block">Paramètres</span>
                    <span class="block text-xs opacity-60 truncate transition-opacity duration-200 group-hover:opacity-100">
                        Préférences et accessibilité
                    </span>
                </div>

                <svg class="w-4 h-4 opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300" 
                     fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </a>

            <!-- Séparateur dynamique -->
            <div class="my-1 mx-3 sm:mx-4" [ngStyle]="{'border-top': '1px solid ' + borderligne}">
            </div>

            <!-- DÉCONNEXION -->
            <a (click)="deconnecter()" role="menuitem" 
                [ngStyle]="{
                    'background': activeHover === 'logout' ? '#fee2e2' : 'transparent',
                    'color': activeHover === 'logout' ? TextRouge : TextRouge
                }"
                (mouseenter)="activeHover = 'logout'" 
                (mouseleave)="activeHover = null"
                class="group flex items-center px-3 sm:px-4 py-2 sm:py-2.5 text-sm transition-all duration-200 active:scale-[0.98] cursor-pointer relative overflow-hidden">

                <div class="w-7 h-7 sm:w-8 sm:h-8 rounded-lg flex items-center justify-center mr-2 sm:mr-3 shrink-0 transition-all duration-300 group-hover:scale-110 group-hover:-translate-x-1"
                    [ngStyle]="{
                        'background': activeHover === 'logout' ? TextRouge : '#fee2e2',
                        'color': activeHover === 'logout' ? '#FFF' : TextRouge,
                        'box-shadow': activeHover === 'logout' ? '0 4px 12px rgba(239, 68, 68, 0.3)' : 'none'
                    }">
                    <i class="fa-solid fa-right-from-bracket text-sm transition-transform duration-300 group-hover:-translate-x-0.5"></i>
                </div>

                <span class="font-medium text-sm transition-all duration-200 group-hover:translate-x-1 inline-block">
                    Se déconnecter
                </span>

                <svg class="w-4 h-4 opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300 text-red-500" 
                     fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
            </a>

        </div>
    </div>

    <!-- Overlay -->
    <div *ngIf="dropdownOpen"
        class="fixed inset-0 z-40 bg-black/20 backdrop-blur-sm sm:bg-transparent sm:backdrop-blur-none transition-opacity duration-300"
        (click)="toggleDropdown()">
    </div>

</section>
